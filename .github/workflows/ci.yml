name: ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: formbuilder
          POSTGRES_PASSWORD: formbuilder
          POSTGRES_DB: formbuilder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U formbuilder -d formbuilder"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://formbuilder:formbuilder@localhost:5432/formbuilder?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - run: corepack enable && pnpm install
      - run: cp compose.env.example compose.env
      - run: make ci
