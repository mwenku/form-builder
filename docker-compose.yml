services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-formbuilder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-formbuilder}
      POSTGRES_DB: ${POSTGRES_DB:-formbuilder}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-formbuilder}:${POSTGRES_PASSWORD:-formbuilder}@postgres:5432/${POSTGRES_DB:-formbuilder}?sslmode=disable
      API_PORT: ${API_PORT:-9787}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "${API_PORT:-9787}:${API_PORT:-9787}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$$API_PORT/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_PROXY_TARGET: http://api:${API_PORT:-9787}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
